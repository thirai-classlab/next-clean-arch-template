name: Changesets
on:
  push:
    branches: [main]

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # NOTE: cache: pnpm は pnpm-lock.yaml の存在を要求するため、lockfile 不在の
          # 独立 repo 化フェーズでは付けない。CLI repo 側で lockfile commit 後に有効化可能。

      # NOTE: --no-frozen-lockfile は初回 publish 向け (packages/create-app は upstream で
      # workspace member、独立 repo 化時に lockfile 不在)。CLI repo 側で `pnpm install` 後の
      # pnpm-lock.yaml を commit すれば --frozen-lockfile に戻せる。
      - run: pnpm install --no-frozen-lockfile

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset tag
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
