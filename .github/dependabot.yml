version: 2
updates:
  # npm dependencies for CLI package (monorepo nested) - weekly
  - package-ecosystem: npm
    directory: "/packages/create-app"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    open-pull-requests-limit: 5
    # Note: daily patch-only entry removed (P-8) to avoid PR flood (~50+ PRs/month).
    # Repo-level Dependabot security updates cover CVE-triggered patches automatically.

  # npm dependencies for template skeleton (monorepo nested) - weekly
  # NOTE: template/ は giget 経由で fetch される Next.js skeleton。
  # template 自体は publish しないが、dep の脆弱性 / 古さは consuming user に伝播するため watch する。
  - package-ecosystem: npm
    directory: "/template"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    open-pull-requests-limit: 5

  # GitHub Actions - weekly (.github/workflows/ at root)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    open-pull-requests-limit: 5
