name: Changesets
on:
  push:
    branches: [main]

# NOTE (monorepo recovery v0.1.1):
# - changesets CLI は monorepo root で実行 (`.changeset/` が root 配下、pnpm workspace 経由で
#   packages/create-app の package.json を自動 detect)。
# - changesets/action は root の `.changeset/*.md` を消費して Version PR を作成、
#   merge 後に同 action が `pnpm changeset tag` で tag を打つ。
#   ※ tag 連動の publish は release.yml 側 (本 changesets.yml は publish しない)。

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # NOTE: cache: pnpm は lockfile 不在のため初回は付けない。

      - run: pnpm install --no-frozen-lockfile

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          # NOTE: monorepo root 実行。`.changeset/*.md` 消費 → packages/create-app/package.json
          # の version を bump → Version PR を自動作成。
          version: pnpm changeset version
          publish: pnpm changeset tag
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
