name: CI
on:
  pull_request:
  push:
    branches: [main]

# NOTE (monorepo recovery v0.1.1):
# - workflows は repo root に置く必要あり。
# - pnpm workspace 構成のため `pnpm install` は root で 1 度。
# - test / type-check / build は `pnpm --filter @takuma-hirai/create-app` で CLI package のみに絞る
#   (template/ は実 build せず、CLI 経由 fetch されるため CI build 不要)。
#
# NOTE (vps-next-mariadb profile, HIGH fix):
# - `template-drift` job: prisma/schema.prisma (postgresql) と
#   prisma/mariadb/schema.prisma (mysql) の dual-schema drift guard
#   (`pnpm check:schema-drift`) + template unit tests を PR ごとに強制する。
#   これが無いと片側 schema だけの変更が CI を素通りする。

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          # NOTE: cache: pnpm は lockfile 不在のため初回は付けない。

      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @takuma-hirai/create-app type-check
      - run: pnpm --filter @takuma-hirai/create-app test
      - run: pnpm --filter @takuma-hirai/create-app build

      - name: Verify changeset file presence (H-02)
        # dependabot は changeset を作成できないため gate を skip する
        # (依存更新は weekly + grouped 設定済、release note は grouped PR title で担保)
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        run: |
          # NOTE: changesets は monorepo root の `.changeset/*.md` で管理。
          # PR diff に `.changeset/<slug>.md` が含まれていれば OK。
          CHANGED=$(gh pr view ${{ github.event.pull_request.number }} \
            --json files --jq '.files[].path' | grep -E '^\.changeset/.*\.md$' || true)
          if [ -z "$CHANGED" ]; then
            echo "::error::No .changeset/*.md file added. Run 'pnpm changeset' to create one."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Dual-schema drift guard + template unit tests (vps-next-mariadb profile).
  # - check:schema-drift fails when prisma/schema.prisma and
  #   prisma/mariadb/schema.prisma diverge (models/fields, provider-specific
  #   annotations normalized away by scripts/lib/schema-normalizer.ts).
  # - the template vitest suite includes schema-drift.test.ts and the
  #   profile-switch / sign-out NextAuth-profile regression specs.
  template-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20

      # postinstall generates both Prisma clients (postgres + mariadb) with
      # dummy DATABASE_URLs — required for template type-level imports/tests.
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter next-clean-arch-template check:schema-drift
      - run: pnpm --filter next-clean-arch-template test

  # NestJS API (template/api) — vps-nest-* profiles (HIGH fix).
  # template/api is a standalone npm package (NOT in the pnpm workspace), so
  # its Jest suites (auth.service / auth.controller / roles.guard unit tests +
  # e2e/auth.e2e-spec.ts) were never executed by the jobs above. This job
  # builds + tests it independently. postinstall generates both Prisma clients.
  nest-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: template/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run test:e2e
